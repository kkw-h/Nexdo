services:
  postgres:
    image: postgres:16-alpine
    container_name: nexdo-postgres
    environment:
      POSTGRES_DB: nexdo
      POSTGRES_USER: nexdo
      POSTGRES_PASSWORD: nexdo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexdo -d nexdo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nexdo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexdo-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_NAME: nexdo-server
      APP_ADDR: ":8080"
      DATABASE_URL: postgres://nexdo:nexdo@postgres:5432/nexdo?sslmode=disable
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_TTL_SECONDS: "3600"
      JWT_REFRESH_TTL_SECONDS: "2592000"
      AUDIO_STORAGE_DIR: /app/storage/audio
      AUTO_MIGRATE: "true"
      MIGRATIONS_DIR: /app/migrations
    volumes:
      - nexdo_storage:/app/storage
    restart: unless-stopped

volumes:
  postgres_data:
  nexdo_storage:
